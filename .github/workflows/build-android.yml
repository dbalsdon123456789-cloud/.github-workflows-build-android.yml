yaml

name: Build Android App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Project Structure
        run: |
          echo '{"name": "advanced-sepsis", "version": "1.0.0"}' > package.json
          mkdir -p www
          if [ ! -f www/index.html ]; then cp index.html www/index.html || true; fi

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor App
        run: |
          npx cap init "Advanced Sepsis" "com.advanced.sepsis" --web-dir=www
          npx cap add android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: advanced-sepsis-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
